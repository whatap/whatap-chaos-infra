[[inputs.logsink]]
  # Ship to the existing AppLog category so the AIOps batch worker
  # for `pr{pcode}/AppLog` processes our rows immediately. The
  # current LogProcessor / PatternFilter / ErrorQueue chain is
  # tuned for the AppLog schema (`level`, `content`, `oid`, etc.);
  # this is the same path real APM error logs traverse, with the
  # one difference that infra-agent logsink writes no `@txid`,
  # which is exactly what the no-txid drop fix targets.
  # Use `oname=chaos-no-txid-logs` (set via WHATAP_ONAME env →
  # whatap.conf) to filter our rows out of any real APM AppLog data.
  category = "AppLog"
  stats_enabled = true
  stats_category = "logsink_stats"
  excludeNames = [ ".gz",".zip" ]

  [[inputs.logsink.file]]
    path = "/var/log/no-txid/*.log"
    disabled = false
    encoding = "utf-8"
