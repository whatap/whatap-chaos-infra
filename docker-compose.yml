###############################################
# WhaTap Chaos Infra - Log Flood Demo
#
# Works on both Linux and macOS (Apple Silicon)
#
# Usage:
#   ./start_runner.sh                    # start all
#   ./trouble/log-flood/start.sh         # begin chaos
#   ./trouble/log-flood/stop.sh          # stop chaos
#   ./stop_runner.sh                     # stop all
###############################################

services:
  log-flood:
    build: ./runner/log-flood
    container_name: chaos-log-flood
    hostname: batch-server-01
    privileged: true
    volumes:
      - ./whatap.conf:/tmp/whatap-base.conf:ro
    environment:
      - DISK_LIMIT_MB=${DISK_LIMIT_MB:-1024}
      - WHATAP_ONAME=chaos-log-flood
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
    restart: unless-stopped

  no-txid-logs:
    # Standalone container that ships ERROR-level log lines through the
    # WhaTap-Infra agent's logsink module — every line arrives at the
    # gateway with no @txid attached. Used to validate the AIOps
    # "solo log admitted" path (no-txid drop fix). Does NOT depend on
    # the runner; bring up with `docker compose up -d no-txid-logs`.
    build: ./runner/no-txid-logs
    container_name: chaos-no-txid-logs
    hostname: app-server-no-txid
    volumes:
      - ./whatap.conf:/tmp/whatap-base.conf:ro
    environment:
      - WHATAP_ONAME=chaos-no-txid-logs
      - INTERVAL_SEC=${NO_TXID_INTERVAL_SEC:-5}
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"
    restart: unless-stopped

  runner:
    build: ./runner
    container_name: chaos-runner
    ports:
      - "9090:9090"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./whatap.conf:/tmp/whatap-base.conf:ro
    environment:
      - WHATAP_ONAME=chaos-runner
    depends_on:
      - log-flood
    restart: unless-stopped
